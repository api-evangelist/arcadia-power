description: >-
  Arcadia is a clean-energy access and energy-intelligence company that operates Arc, a utility data platform giving
  developers programmatic access to utility bills, statements, meters, interval (15-minute) usage data, tariff rates,
  and provider metadata across thousands of US and international utilities. Arc combines the Plug API for utility data,
  Arcadia Connect for hosted credential collection and MFA, Signal for tariff and rate calculations, and webhooks for
  asynchronous events. Arcadia powers solar and storage modeling, EV charging, energy management, property management,
  and carbon accounting for customers including Ford, EVgo, Enphase, Oracle, UPS, Conagra, Penske, and ~25% of the
  Fortune 500. In April 2026 Arcadia acquired ENGIE Impact, adding utility bill management, energy procurement advisory,
  and sustainability reporting capabilities.
