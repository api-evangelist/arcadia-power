apis:
  - aid: arcadia-power:arcadia-plug-api
    name: Arcadia Plug API
    tags:
      - Energy
      - Utility Data
      - Clean Energy
      - Bills
      - Meters
      - Intervals
    humanURL: https://docs.arcadia.com/reference/introduction
    baseURL: https://api.arcadia.com/plug
    properties:
      - url: https://docs.arcadia.com/reference/introduction
        type: Documentation
      - url: https://docs.arcadia.com/docs/api-quick-start-guide
        type: GettingStarted
      - url: openapi/arcadia-plug-api-openapi.yml
        type: OpenAPI
      - url: json-schema/arcadia-statement-schema.json
        type: JSONSchema
      - url: json-schema/arcadia-meter-schema.json
        type: JSONSchema
      - url: json-schema/arcadia-interval-schema.json
        type: JSONSchema
      - url: json-ld/arcadia-power-context.jsonld
        type: JSONLD
    description: >-
      The Arcadia Plug API is the flagship developer surface of the Arc data platform — programmatic access to utility
      bill, statement, meter, interval, site, and provider data sourced from thousands of US and international
      utilities. Plug powers solar/storage modeling, EV charging, energy management, property management, and carbon
      accounting use cases. OAuth 2.0 client-credentials authentication; versioned via the Arcadia-Version header
      (current default 2024-02-21).
  - aid: arcadia-power:arcadia-connect-api
    name: Arcadia Connect API
    tags:
      - Energy
      - Utility Data
      - Authentication
      - Credentials
      - Onboarding
    humanURL: https://docs.arcadia.com/docs/connect-guide
    properties:
      - url: https://docs.arcadia.com/docs/connect-guide
        type: Documentation
    description: >-
      Arcadia Connect is a hosted credential-collection web experience that handles utility account onboarding —
      credential capture, MFA flows, one-time passcodes, and credential refresh — without requiring partners to handle
      utility passwords directly. The accompanying Connect API generates encoded session URLs and exposes credential
      lifecycle endpoints (create, update, refresh, disable).
  - aid: arcadia-power:arcadia-signal-api
    name: Arcadia Signal API
    tags:
      - Energy
      - Utility Data
      - Tariff
      - Rates
      - Real-Time
    humanURL: https://docs.arcadia.com/v2022-12-21-Signal/docs/quick-start
    properties:
      - url: https://docs.arcadia.com/v2022-12-21-Signal/docs/quick-start
        type: Documentation
    description: >-
      Arcadia Signal provides utility tariff and energy rate data and calculations for use in cost-benefit analyses,
      bill audits, project forecasting, and financial modeling. Signal powers the Tariff & Energy Rate Calculator
      product and supports customers building solar, storage, EV charging, and demand-response economics.
  - aid: arcadia-power:arcadia-webhooks-api
    name: Arcadia Webhooks API
    tags:
      - Energy
      - Webhooks
      - Events
      - Notifications
    humanURL: https://docs.arcadia.com/reference/list-webhooks
    properties:
      - url: https://docs.arcadia.com/reference/list-webhooks
        type: Documentation
    description: >-
      List, retrieve, and resend webhooks for asynchronous Plug platform events including statement availability, meter
      activation, interval data readiness, and credential lifecycle changes. Arcadia recommends webhooks over polling
      for production integrations.
  - aid: arcadia-power:arcadia-utility-cloud-api
    name: Arcadia Utility Cloud API (Legacy)
    tags:
      - Energy
      - Utility Data
      - Legacy
    humanURL: https://docs.arcadia.com/v1.0-Utility-Cloud/docs/api-quick-start-guide
    properties:
      - url: https://docs.arcadia.com/v1.0-Utility-Cloud/docs/api-quick-start-guide
        type: Documentation
      - url: https://docs.arcadia.com/v1.0-Utility-Cloud/reference/introduction
        type: Documentation
    description: >-
      The legacy Utility Cloud REST API — predecessor to the Plug API — still documented for existing integrations. New
      integrations should use the Plug API; the Utility Cloud version remains available for backward compatibility.
