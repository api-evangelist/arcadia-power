name: arcadia-plug-meters
description: List, retrieve, update, and download meter usage data through the Arcadia Plug API.
provider: arcadia-power
api: arcadia-plug-api
baseURL: https://api.arcadia.com
authentication:
  type: oauth2
  flow: client_credentials
  tokenURL: https://api.arcadia.com/oauth2/token
headers:
  Arcadia-Version: '2024-02-21'
operations:
- id: listMeters
  method: GET
  path: /plug/meters
  summary: List Meters
- id: retrieveMeter
  method: GET
  path: /plug/meters/{meterId}
  summary: Retrieve Meter
- id: setMeter
  method: PUT
  path: /plug/meters/{meterId}
  summary: Set Meter
- id: updateMeter
  method: PATCH
  path: /plug/meters/{meterId}
  summary: Update Meter
- id: listMeterEvents
  method: GET
  path: /plug/meters/{meterId}/events
  summary: List Meter's Events
- id: downloadMeterUsage
  method: GET
  path: /plug/meters/{meterId}/usage/download
  summary: Download Meter Usage
- id: downloadMeterIntervals
  method: GET
  path: /plug/meters/{meterId}/intervals/download
  summary: Download Meter Intervals
